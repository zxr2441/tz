<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>体重管理 - 首日备菜版</title>
    <style>
        :root { --green: #07c160; --blue: #4a90e2; --grey: #d1d1d1; --red: #fa5151; --orange: #ff9f43; --bg: #f7f7f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 30px; }
        
        .card { background: #fff; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        input[type="date"], input[type="number"] { border: 1px solid #eee; padding: 5px; border-radius: 4px; width: 105px; text-align: center;}
        
        .prog-bg { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .prog-fill { background: var(--green); height: 100%; width: 0%; transition: 0.5s; }
        
        .chart-container { position: relative; width: 100%; height: 240px; margin-top: 10px; }
        canvas { width: 100%; height: 100%; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #fff; padding: 10px; border-radius: 12px; margin: 10px; gap: 2px; }
        .week-label { color: #999; text-align: center; font-size: 12px; padding-bottom: 10px; }
        .day-item { 
            min-height: 65px; display: flex; flex-direction: column; align-items: center; 
            padding: 5px 0; position: relative; cursor: pointer; border-radius: 6px;
            border: none; background: transparent;
        }
        .day-item:active { background-color: #f0f0f0; }
        .is-today .day-num { background: var(--blue); color: #fff; box-shadow: 0 2px 4px rgba(74, 144, 226, 0.4); }
        .is-selected .day-num { background: var(--red); color: #fff; box-shadow: 0 2px 4px rgba(250, 81, 81, 0.4); }
        
        .day-num { font-size: 14px; font-weight: bold; margin-bottom: 2px; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; transition: all 0.2s; }
        .w-val { font-size: 11px; margin-top: 2px; }
        .w-real { color: var(--blue); font-weight: bold; }
        .w-plan { color: var(--grey); }
        .w-diff { font-size: 10px; transform: scale(0.9); margin-top: 1px; }
        .up { color: var(--red); }
        .down { color: var(--green); }

        .btn { background: var(--green); color: #fff; text-align: center; padding: 12px; margin: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; }
        .modal-box { position:absolute; top:30%; left:50%; transform:translate(-50%,-50%); background:#fff; width:80%; padding:20px; border-radius:12px; }

        /* 食谱卡片样式 */
        .diet-card { margin: 10px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .diet-header { 
            background: #f8f8f8; padding: 12px 15px; 
            border-bottom: 1px solid #eee; 
            display: flex; justify-content: space-between; align-items: center; 
            flex-wrap: wrap; gap: 10px;
        }
        .diet-left { display: flex; flex-direction: column; }
        .diet-title { color: #333; font-size: 15px; font-weight: bold; }
        .diet-sub { font-size: 12px; color: #666; margin-top: 2px; }
        
        .diet-right { 
            background: #fff5e6; 
            color: #e67e22; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: bold;
            display: flex; align-items: center; gap: 5px;
            border: 1px solid #ffe0b2;
        }
        .shopping-preview-text { font-weight: normal; color: #666; font-size: 11px; margin-left: 4px; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .diet-list { padding: 0; margin: 0; list-style: none; }
        .diet-day-block { border-bottom: 1px solid #f5f5f5; padding: 12px 15px; }
        .diet-day-block:last-child { border-bottom: none; }
        .diet-day-title { font-size: 13px; font-weight: bold; color: var(--red); margin-bottom: 6px; display: flex; justify-content: space-between; }
        .diet-meals { font-size: 12px; color: #555; line-height: 1.6; }
        .meal-tag { display: inline-block; width: 32px; color: #999; font-weight: bold; }
        
        /* 备菜总览区 - 只显示第一天的菜 */
        .shopping-summary {
            background: #fffaf0;
            padding: 12px 15px;
            font-size: 13px;
            color: #333;
            border-bottom: 1px dashed #ffe0b2;
        }
        .shopping-summary strong { color: #e67e22; font-size: 14px; }
        .shopping-summary .logic-hint { display: block; font-size: 11px; color: #999; margin-top: 4px; font-weight: normal; }
        
        /* 具体的早中晚清单样式 */
        .shopping-detail-list { margin-top: 10px; background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #ffe0b2; }
        .shopping-item-row { display: flex; font-size: 12px; margin-bottom: 4px; }
        .shopping-item-row:last-child { margin-bottom: 0; }
        .s-label { width: 35px; color: #999; font-weight: bold; flex-shrink: 0; }
        .s-content { color: #333; }

        .no-diet-msg { text-align: center; color: #999; font-size: 13px; padding: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="input-row">
        <span>开始: <input type="date" id="sDate" value="2026-03-09"></span>
        <span>结束: <input type="date" id="eDate" value="2026-03-31"></span>
    </div>
    <div class="input-row">
        <span>初始: <input type="number" id="sWeight" value="121.4" step="0.1">斤</span>
        <span>目标: <input type="number" id="tWeight" value="100.0" step="0.1">斤</span>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
    <div style="font-size:12px; color:#666; text-align:center;">
        已完成 <span id="progPerc">0</span>% | 已减 <span id="reducedW">0</span>斤
    </div>
</div>

<div class="card">
    <div style="font-size:13px; font-weight:bold; margin-bottom:15px;">体重趋势 (红色连线)</div>
    <div class="chart-container">
        <canvas id="weightChart"></canvas>
    </div>
</div>

<div class="grid" id="calendar"></div>

<!-- 食谱卡片 -->
<div class="diet-card" id="dietCard" style="display:none;">
    <div class="diet-header">
        <div class="diet-left">
            <span class="diet-title">📅 饮食计划预览</span>
            <span class="diet-sub" id="dietRangeText"></span>
        </div>
        <div class="diet-right" id="shoppingHeaderBtn" style="display:none;">
            🛒 提前下单
            <span class="shopping-preview-text" id="shoppingPreviewText"></span>
        </div>
    </div>
    
    <!-- 备菜总览区：只显示第一天要买的 -->
    <div class="shopping-summary" id="shoppingSummaryBox" style="display:none;">
        <div>
            <strong>📅 需在 <span id="buyDateText" style="font-size:16px; color:#d35400;"></span> 下单购买</strong>
            <span class="logic-hint">*为了保障 <span id="eatDateText"></span> 的第一顿正餐，请提前2天采购</span>
        </div>
        
        <!-- 详细清单：早中晚 -->
        <div class="shopping-detail-list" id="shoppingDetailList">
            <!-- JS填充 -->
        </div>
    </div>

    <div class="diet-list" id="dietListContent">
        <!-- 7天食谱列表 -->
    </div>
</div>

<div class="btn" onclick="init()">更新并保存所有数据</div>

<div id="modal">
    <div class="modal-box">
        <h4 id="mDate" style="margin:0 0 15px 0"></h4>
        <input type="number" id="mInput" style="width:100%; padding:12px; font-size:20px; border:1px solid #ddd; box-sizing:border-box;" step="0.1" placeholder="0.0">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; background:#eee; border:none; border-radius:6px;">取消</button>
            <button onclick="save()" style="flex:1; padding:10px; background:var(--green); color:#fff; border:none; border-radius:6px;">确认记录</button>
        </div>
    </div>
</div>

<script>
    let weightLogs = JSON.parse(localStorage.getItem('logs_2026') || '{}');
    let editDate = "";
    let selectedDateForDiet = null;
    const WEEK_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];

    // 21天减肥法详细食谱数据
    const dietPlan = [
        { b: "蜂蜜水", l: "水", d: "水" }, // Day 1
        { b: "蜂蜜水", l: "水", d: "水" }, // Day 2
        { b: "蜂蜜水", l: "水", d: "水" }, // Day 3
        { b: "2个苹果", l: "酸奶+2番茄", d: "水" }, // Day 4
        { b: "2根黄瓜", l: "酸奶+2苹果", d: "水" }, // Day 5
        { b: "2个番茄", l: "酸奶+2苹果", d: "水" }, // Day 6
        { b: "2根黄瓜", l: "水煮娃娃菜", d: "水" }, // Day 7
        { b: "2个火龙果", l: "水煮西兰花", d: "水" }, // Day 8
        { b: "2个番茄", l: "水煮包菜", d: "水" }, // Day 9
        { b: "2个火龙果", l: "水煮生菜", d: "水" }, // Day 10
        { b: "2个番茄", l: "水煮西兰花", d: "水" }, // Day 11
        { b: "牛奶+鸡蛋", l: "水煮蛋", d: "苹果+黄瓜" }, // Day 12
        { b: "水煮蛋", l: "水煮蛋", d: "苹果+黄瓜" }, // Day 13
        { b: "黑芝麻糊", l: "鸡胸肉+西兰花", d: "苹果+黄瓜" }, // Day 14
        { b: "黑芝麻糊", l: "玉米+番茄", d: "苹果+番茄" }, // Day 15
        { b: "黑芝麻糊", l: "红薯+黄瓜", d: "苹果+番茄" }, // Day 16
        { b: "牛奶麦片", l: "玉米+番茄", d: "苹果+番茄" }, // Day 17
        { b: "黑芝麻糊", l: "红薯+黄瓜", d: "南瓜+番茄" }, // Day 18
        { b: "牛奶麦片", l: "黄瓜炒鸡蛋", d: "南瓜+番茄" }, // Day 19
        { b: "牛奶", l: "水煮蛋", d: "西兰花+番茄" }, // Day 20
        { b: "牛奶", l: "水煮蛋", d: "西兰花+番茄" }  // Day 21
    ];

    function init() {
        const conf = {
            sd: document.getElementById('sDate').value,
            ed: document.getElementById('eDate').value,
            sw: parseFloat(document.getElementById('sWeight').value),
            tw: parseFloat(document.getElementById('tWeight').value)
        };
        localStorage.setItem('conf_2026', JSON.stringify(conf));
        renderCal(conf);
        drawChart(conf);
        
        const todayStr = new Date().toISOString().split('T')[0];
        show7DaysDiet(todayStr, new Date(conf.sd));
    }

    function renderCal(conf) {
        const grid = document.getElementById('calendar');
        grid.innerHTML = ['日','一','二','三','四','五','六'].map(w => `<div class="week-label">${w}</div>`).join('');
        
        const start = new Date(conf.sd);
        const end = new Date(conf.ed);
        const totalDays = Math.ceil((end - start) / 86400000) + 1;
        const dailyTarget = (conf.sw - conf.tw) / (totalDays || 1);
        
        const year = start.getFullYear();
        const month = start.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDayOfWeek = new Date(year, month, 1).getDay();

        for(let i=0; i<firstDayOfWeek; i++) grid.innerHTML += '<div></div>';

        let lastW = null;
        let latestRecordedW = conf.sw;
        const todayStr = new Date().toISOString().split('T')[0];

        for(let i=1; i<=daysInMonth; i++) {
            const dateStr = `${year}-${(month+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
            const curDate = new Date(dateStr);
            
            let planW = '';
            if (curDate >= start && curDate <= end) {
                const daysPast = (curDate - start) / 86400000;
                planW = (conf.sw - (dailyTarget * daysPast)).toFixed(1);
            }

            const realW = weightLogs[dateStr];
            
            let diffHtml = "";
            if (realW) {
                if (lastW !== null) {
                    const diff = (realW - lastW).toFixed(1);
                    diffHtml = `<div class="w-diff ${diff>0?'up':'down'}">${diff>0?'+':''}${diff}</div>`;
                }
                lastW = parseFloat(realW);
                latestRecordedW = realW;
            }

            const isToday = (dateStr === todayStr);
            const isSelected = (dateStr === selectedDateForDiet);
            
            let classList = "day-item";
            if (isToday) classList += " is-today";
            if (isSelected) classList += " is-selected";

            grid.innerHTML += `
                <div class="${classList}" onclick="handleDayClick('${dateStr}')">
                    <div class="day-num">${i}</div>
                    <div class="w-val ${realW ? 'w-real' : 'w-plan'}">${realW || (planW ? planW : '')}</div>
                    ${diffHtml}
                </div>
            `;
        }

        const red = (conf.sw - latestRecordedW).toFixed(1);
        const perc = Math.min(100, Math.max(0, (red / (conf.sw - conf.tw) * 100))).toFixed(1);
        document.getElementById('progFill').style.width = perc + '%';
        document.getElementById('progPerc').innerText = perc;
        document.getElementById('reducedW').innerText = red;
    }

    function handleDayClick(dateStr) {
        openM(dateStr);
        const conf = JSON.parse(localStorage.getItem('conf_2026'));
        if(conf) {
            show7DaysDiet(dateStr, new Date(conf.sd));
        }
    }

    function show7DaysDiet(start_dateStr, startDate) {
        const card = document.getElementById('dietCard');
        const listDiv = document.getElementById('dietListContent');
        const rangeText = document.getElementById('dietRangeText');
        const shoppingHeaderBtn = document.getElementById('shoppingHeaderBtn');
        const shoppingPreviewText = document.getElementById('shoppingPreviewText');
        const shoppingSummaryBox = document.getElementById('shoppingSummaryBox');
        const buyDateText = document.getElementById('buyDateText');
        const eatDateText = document.getElementById('eatDateText');
        const shoppingDetailList = document.getElementById('shoppingDetailList');
        
        const startD = new Date(start_dateStr);
        const planStartD = new Date(startDate);
        
        const diffTime = startD - planStartD;
        const startDayIndex = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        if (startDayIndex < 0 || startDayIndex >= dietPlan.length) {
            card.style.display = 'none';
            return;
        }

        card.style.display = 'block';
        listDiv.innerHTML = '';
        
        // 计算日期范围显示
        const endD = new Date(startD);
        endD.setDate(endD.getDate() + 6);
        const m1 = startD.getMonth()+1, d1 = startD.getDate();
        const m2 = endD.getMonth()+1, d2 = endD.getDate();
        rangeText.innerText = `${m1}/${d1} - ${m2}/${d2}`;

        // --- 核心逻辑：只找第一天需要买菜的 ---
        
        let firstEatIndex = -1;
        let firstEatDateObj = null;
        let firstEatPlan = null;

        // 遍历未来7天，找到第一个不是喝水的日子
        for(let i=0; i<7; i++) {
            const currentDayIndex = startDayIndex + i;
            if(currentDayIndex >= dietPlan.length) break;
            
            const plan = dietPlan[currentDayIndex];
            // 判断是否包含实物（非纯水）
            if (plan.b !== "蜂蜜水" && plan.b !== "温水" && plan.l !== "温水") {
                firstEatIndex = currentDayIndex;
                firstEatDateObj = new Date(startD);
                firstEatDateObj.setDate(firstEatDateObj.getDate() + i);
                firstEatPlan = plan;
                break;
            }
        }

        if (firstEatIndex === -1 || !firstEatPlan) {
            // 如果这7天都在喝水
            shoppingHeaderBtn.style.display = "none";
            shoppingSummaryBox.style.display = "none";
        } else {
            // 计算下单日期：想吃的那天 - 2天
            const buyDateObj = new Date(firstEatDateObj);
            buyDateObj.setDate(buyDateObj.getDate() - 2);
            
            const bm = buyDateObj.getMonth() + 1;
            const bd = buyDateObj.getDate();
            const bw = WEEK_NAMES[buyDateObj.getDay()];
            
            const em = firstEatDateObj.getMonth() + 1;
            const ed = firstEatDateObj.getDate();
            
            buyDateText.innerText = `${bm}月${bd}日 (${bw})`;
            eatDateText.innerText = `${em}月${ed}日`;
            
            // 更新右上角预览
            shoppingHeaderBtn.style.display = "flex";
            const previewItems = [firstEatPlan.b, firstEatPlan.l, firstEatPlan.d].join(", ");
            shoppingPreviewText.innerText = previewItems.length > 15 ? previewItems.substring(0, 15) + "..." : previewItems;
            
            // 更新下方详细清单：只显示这一天的早中晚
            shoppingSummaryBox.style.display = "block";
            shoppingDetailList.innerHTML = `
                <div class="shopping-item-row">
                    <span class="s-label">早餐</span>
                    <span class="s-content">${firstEatPlan.b}</span>
                </div>
                <div class="shopping-item-row">
                    <span class="s-label">午餐</span>
                    <span class="s-content">${firstEatPlan.l}</span>
                </div>
                <div class="shopping-item-row">
                    <span class="s-label">晚餐</span>
                    <span class="s-content">${firstEatPlan.d}</span>
                </div>
            `;
        }

        // 生成7天食谱列表（保持不变，供参考）
        for(let i=0; i<7; i++) {
            const currentDayIndex = startDayIndex + i;
            if(currentDayIndex >= dietPlan.length) break;

            const currentDate = new Date(startD);
            currentDate.setDate(currentDate.getDate() + i);
            const dayNum = currentDate.getDate();
            const week = WEEK_NAMES[currentDate.getDay()];
            const plan = dietPlan[currentDayIndex];
            
            const dayTitle = `${currentDayIndex + 1}天 (${monthToChinese(currentDate.getMonth()+1)}月${dayNum}日 ${week})`;
            
            const html = `
                <div class="diet-day-block">
                    <div class="diet-day-title">
                        <span>${dayTitle}</span>
                    </div>
                    <div class="diet-meals">
                        <div><span class="meal-tag">早餐</span>${plan.b}</div>
                        <div><span class="meal-tag">午餐</span>${plan.l}</div>
                        <div><span class="meal-tag">晚餐</span>${plan.d}</div>
                    </div>
                </div>
            `;
            listDiv.innerHTML += html;
        }
    }

    function monthToChinese(m) { return m; }

    function drawChart(conf) {
        const canvas = document.getElementById('weightChart');
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        const dataPoints = [];
        const sortedDates = Object.keys(weightLogs).sort();
        
        sortedDates.forEach(dateStr => {
            const dt = new Date(dateStr);
            dataPoints.push({
                val: parseFloat(weightLogs[dateStr]),
                label: `${dt.getMonth()+1}/${dt.getDate()}`,
                week: WEEK_NAMES[dt.getDay()]
            });
        });

        if(dataPoints.length < 1) {
            ctx.fillStyle = "#999";
            ctx.font = "14px Arial";
            ctx.textAlign = "center";
            ctx.fillText("暂无数据，请在日历中点击日期录入", rect.width/2, rect.height/2);
            return;
        }

        const padding = { top: 20, left: 40, right: 20, bottom: 40 };
        const chartW = rect.width - padding.left - padding.right;
        const chartH = rect.height - padding.top - padding.bottom;

        const vals = dataPoints.map(p => p.val);
        const maxVal = Math.max(...vals, conf.sw) + 2;
        const minVal = Math.min(...vals, conf.tw) - 2;
        const range = maxVal - minVal;
        
        ctx.strokeStyle = '#f0f0f0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<=5; i++) {
            const y = padding.top + (chartH / 5) * i;
            ctx.moveTo(padding.left, y);
            ctx.lineTo(rect.width - padding.right, y);
            
            const val = maxVal - (range / 5) * i;
            ctx.fillStyle = '#999';
            ctx.font = '10px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(val.toFixed(1), padding.left - 5, y + 3);
        }
        ctx.stroke();

        const stepX = dataPoints.length > 1 ? chartW / (dataPoints.length - 1) : 0;
        
        ctx.beginPath();
        ctx.strokeStyle = '#fa5151'; 
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        dataPoints.forEach((p, i) => {
            const x = padding.left + i * stepX;
            const y = padding.top + chartH - ((p.val - minVal) / range) * chartH;
            
            if(i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);

            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#fa5151';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.fillStyle = '#666';
            ctx.textAlign = 'center';
            ctx.font = '10px Arial';
            if (dataPoints.length <= 10 || i % 2 === 0) {
                 ctx.fillText(p.label, x, rect.height - 15);
            }
            ctx.restore();
        });
        ctx.stroke();
    }

    function openM(d) {
        editDate = d;
        selectedDateForDiet = d;
        const conf = JSON.parse(localStorage.getItem('conf_2026'));
        if(conf) renderCal(conf);

        document.getElementById('mDate').innerText = d + " 体重记录";
        document.getElementById('mInput').value = weightLogs[d] || "";
        document.getElementById('modal').style.display = 'block';
        setTimeout(()=>document.getElementById('mInput').focus(), 100);
    }
    
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function save() {
        const v = document.getElementById('mInput').value;
        if(v) weightLogs[editDate] = parseFloat(v).toFixed(1);
        else delete weightLogs[editDate];
        localStorage.setItem('logs_2026', JSON.stringify(weightLogs));
        closeModal();
        init();
        setTimeout(() => {
            selectedDateForDiet = editDate;
            const conf = JSON.parse(localStorage.getItem('conf_2026'));
            if(conf) {
                renderCal(conf);
                show7DaysDiet(editDate, new Date(conf.sd));
            }
        }, 50);
    }

    window.onload = () => {
        const s = localStorage.getItem('conf_2026');
        if(s) {
            const c = JSON.parse(s);
            document.getElementById('sDate').value = c.sd;
            document.getElementById('eDate').value = c.ed;
            document.getElementById('sWeight').value = c.sw;
            document.getElementById('tWeight').value = c.tw;
        }
        init();
    }
</script>
</body>
</html>
